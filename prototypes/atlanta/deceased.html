<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlanta 往生蓮位 — Layout Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ===================================================================
     TUNABLE CONFIG — coords in the real 320 x 848 template space.
     往生蓮位 = 長生祿位's 3-zone center + 冤親債主's left margin column.
     Center middle is DYNAMIC: 称谓 (own column) + deceased name.
     Left margin = petitioner (陽上者): 陽上 / 稱謂 / name / 敬薦.
  =================================================================== */
  :root {
    --ink: #2b2620;

    /* Center band (same as longevity) */
    --band-x: 80px;
    --band-width: 160px;
    --band-top: 195px;
    --band-bottom: 716px;

    --fixed-size: 38px;      /* 佛力超薦 / 往生蓮位 — the PRIMARY (enlarged) text */
    --fixed-weight: 500;
    --gap-fixed-name: 14px;

    --mid-size: 38px;        /* 称谓+名字 base — capped <= --fixed-size in code */
    --mid-min: 16px;

    /* Left margin column (OUTSIDE the 卍 rail) */
    --left-x: 30px;
    --left-size: 20px;
    --yang-top: 215px;       /* 陽上 (top) */
    --jian-top: 676px;       /* 敬薦 — bottom-aligned to y=716 (same as center bottom / 往生蓮位),
                                so the petitioner zone is FULL height and long titles aren't squeezed.
                                676 = 716 - (2 chars × 20px). Rule for ALL types with a left column. */
    --left-gap: 8px;         /* tight gap below 陽上 before 稱謂/name */
  }

  * { box-sizing: border-box; }
  body { margin: 0; padding: 32px; background: #f6cf57;
    font-family: "Noto Serif TC", serif; color: #2b2620; }
  h1 { font-weight: 600; font-size: 22px; margin: 0 0 4px; }
  .sub { opacity: .8; font-size: 13px; margin: 0 0 20px; }
  .row { margin-bottom: 28px; }
  .row-title { font-size: 13px; opacity: .75; margin: 0 0 10px; font-weight: 500; }
  .gallery { display: flex; flex-wrap: wrap; gap: 22px; align-items: flex-start; }
  .cell { width: 256px; }
  .cell .caption { text-align: center; font-size: 12px; opacity: .8; margin-bottom: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .tablet-scale { transform: scale(0.8); transform-origin: top left; width: 320px; height: 848px; }
  .tablet { position: relative; width: 320px; height: 848px;
    background: #fff url("./frame-blank.svg") center / 320px 848px no-repeat;
    border-radius: 20px; overflow: hidden; }

  /* center band */
  .band { position: absolute; left: var(--band-x); top: var(--band-top);
    width: var(--band-width); height: calc(var(--band-bottom) - var(--band-top)); }
  .fixed { position: absolute; left: 0; width: 100%;
    display: flex; flex-direction: column; align-items: center;
    font-size: var(--fixed-size); font-weight: var(--fixed-weight); line-height: 1; color: var(--ink); }
  .fixed.top { top: 0; }
  .fixed.bottom { bottom: 0; }
  .name-box { position: absolute; left: 0; width: 100%;
    display: flex; align-items: center; justify-content: center; color: var(--ink); }

  /* Chinese: columns right-to-left (称谓 rightmost), each a vertical char stack */
  .cn-cols { display: flex; flex-direction: row-reverse; align-items: center; }
  .cn-col { display: flex; flex-direction: column; align-items: center; line-height: 1; }
  .cn-col > span { display: block; text-align: center; }
  /* Latin: lines stacked vertically, centered */
  .latin { display: flex; flex-direction: column; align-items: center; line-height: 1.15; }
  .latin > span { display: block; white-space: nowrap; }

  /* left margin elements */
  .vcol { position: absolute; display: flex; flex-direction: column; align-items: center;
    line-height: 1; color: var(--ink); transform: translateX(-50%); }
  .vcol > span { display: block; text-align: center; }
  /* Latin petitioner in the narrow left margin: rotated 90°, centered on its anchor */
  .pet-en { position: absolute; white-space: nowrap; color: var(--ink);
    transform: translate(-50%, -50%) rotate(90deg); transform-origin: center; }
</style>
</head>
<body>
  <h1>往生蓮位 — Atlanta Layout Mockup</h1>
  <p class="sub">Center: 佛力超薦 / 称谓+名字(dynamic, 称谓 own column) / 往生蓮位 · Left margin = petitioner (陽上者), language-matched · no production code touched</p>
  <div id="app"></div>

<script>
const CFG = { fixedTop: "佛力超薦", fixedBottom: "往生蓮位", yang: "陽上", jian: "敬薦" };
function isLatin(s){ return /[A-Za-z]/.test(s); }
function px(v){ return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(v)); }

function vcolHtml(text, x, top, fontSize){
  const chars = text.split("").map(c => `<span style="width:${fontSize}px">${c}</span>`).join("");
  return `<div class="vcol" style="left:${x}px;top:${top}px;font-size:${fontSize}px">${chars}</div>`;
}

function centerMiddle(title, name, midH, midW, fixedSize){
  if (isLatin(name) || isLatin(title)) {
    const lines = (title + " " + name).trim().split(/\s+/);
    let fs = px("--mid-size");
    const fitH = midH / (lines.length * 1.15);
    const longest = Math.max(...lines.map(l => l.length));
    const fitW = (midW - 16) / (longest * 0.60);
    fs = Math.max(px("--mid-min"), Math.min(fs, fitH, fitW, fixedSize));
    return `<div class="latin" style="font-size:${fs}px">` + lines.map(l => `<span>${l}</span>`).join("") + `</div>`;
  }
  const cols = [title, name]; // exactly 2 columns: 称谓 (right, read first) + 名字 (left). Name never splits.
  const maxLen = Math.max(...cols.map(c => c.length));
  let fs = px("--mid-size");
  const fitH = midH / maxLen;
  const fitW = midW / (cols.length + (cols.length - 1) * 0.28);
  fs = Math.max(px("--mid-min"), Math.min(fs, fitH, fitW, fixedSize));
  return `<div class="cn-cols" style="gap:${fs*0.28}px">` +
    cols.map(c => `<div class="cn-col" style="font-size:${fs}px">` +
      c.split("").map(ch => `<span style="width:${fs}px">${ch}</span>`).join("") + `</div>`).join("") + `</div>`;
}

// Left margin petitioner (陽上者) = relationship (稱謂) + name, vertically centered between 陽上 and 敬薦.
// Chinese: 稱謂 + name stacked as two vertical groups. Latin/Vietnamese: one rotated line, fit to height.
function leftMargin(petT, petN){
  const lx = px("--left-x"), ls = px("--left-size");
  const yangTop = px("--yang-top"), jianTop = px("--jian-top"), gap = px("--left-gap");
  const yang = vcolHtml(CFG.yang, lx, yangTop, ls);
  const jian = vcolHtml(CFG.jian, lx, jianTop, ls);

  const zoneTop = yangTop + CFG.yang.length * ls + gap;
  const zoneBottom = jianTop - gap;
  const zoneCenter = (zoneTop + zoneBottom) / 2; // petitioner block vertically CENTERED in the zone

  const combined = (petT + " " + petN).trim();
  let block;
  if (isLatin(combined)) {
    const span = zoneBottom - zoneTop;
    const fit = span / (combined.length * 0.55); // rotated: text length runs down the column
    const fs = Math.max(8, Math.min(ls, fit));
    block = `<div class="pet-en" style="left:${lx}px;top:${zoneCenter}px;font-size:${fs}px">${combined}</div>`;
  } else {
    const innerGap = 6;
    const tH = petT.length * ls, nH = petN.length * ls;
    const blockTop = zoneCenter - (tH + innerGap + nH) / 2;
    block = vcolHtml(petT, lx, blockTop, ls) +
            vcolHtml(petN, lx, blockTop + tH + innerGap, ls);
  }
  return yang + block + jian;
}

function makeTablet(title, name, petT, petN){
  const bandH = px("--band-bottom") - px("--band-top");
  const fixedSize = px("--fixed-size");
  const gap = px("--gap-fixed-name");
  const topH = CFG.fixedTop.length * fixedSize, botH = CFG.fixedBottom.length * fixedSize;
  const nameTop = topH + gap, nameBottom = botH + gap;
  const midH = bandH - nameTop - nameBottom;
  const midW = px("--band-width");

  const topFixed = `<div class="fixed top">` + CFG.fixedTop.split("").map(c=>`<span>${c}</span>`).join("") + `</div>`;
  const botFixed = `<div class="fixed bottom">` + CFG.fixedBottom.split("").map(c=>`<span>${c}</span>`).join("") + `</div>`;
  const nameBox = `<div class="name-box" style="top:${nameTop}px;bottom:${nameBottom}px">${centerMiddle(title, name, midH, midW, fixedSize)}</div>`;
  const band = `<div class="band">${topFixed}${nameBox}${botFixed}</div>`;

  return `<div class="tablet-scale"><div class="tablet">${band}${leftMargin(petT, petN)}</div></div>`;
}

const ROWS = [
  { title: "Chinese — center 称谓+名字 (own columns) · left = real 陽上者 (relationship + name)", cases: [
    {cap:"先父 張三 / 孝子 張學峰", title:"先父", name:"張三", petT:"孝子", petN:"張學峰"},
    {cap:"姑父 歐陽蘭君 / 姪女 李佩玉", title:"姑父", name:"歐陽蘭君", petT:"姪女", petN:"李佩玉"},
    {cap:"曾祖父 清江布買買提 / 曾孫 劉貝加", title:"曾祖父", name:"清江布買買提", petT:"曾孫", petN:"劉貝加"},
    {cap:"外曾祖父 李華 / 外曾孫 陳大文", title:"外曾祖父", name:"李華", petT:"外曾孫", petN:"陳大文"},
  ]},
  { title: "English — center title+name (horizontal); petitioner = relationship + name", cases: [
    {cap:"Mother Taylor Smith / Daughter Mary Smith", title:"Mother", name:"Taylor Smith", petT:"Daughter", petN:"Mary Smith"},
    {cap:"Great Grand-Mother … / Great grandson …", title:"Great Grand-Mother", name:"Elizabeth Alexander Smith", petT:"Great grandson Tom & daughter", petN:"Mary Smith"},
  ]},
  { title: "Vietnamese — real kinship titles + Vietnamese petitioner", cases: [
    {cap:"Mẹ (mother) / Con gái", title:"Mẹ", name:"Hoàng Thảo Hương", petT:"Con gái", petN:"Nguyễn Thị Mai"},
    {cap:"Bà nội (paternal grandma) / Cháu nội", title:"Bà nội", name:"Nguyễn Thị Lan", petT:"Cháu nội", petN:"Trần Văn Nam"},
    {cap:"Ông ngoại (maternal grandpa) / Con trai", title:"Ông ngoại", name:"Trần Văn Minh", petT:"Con trai", petN:"Lê Văn Hùng"},
  ]},
];

document.getElementById("app").innerHTML = ROWS.map(row =>
  `<div class="row"><div class="row-title">${row.title}</div><div class="gallery">` +
  row.cases.map(c => `<div class="cell"><div class="caption">${c.cap}</div>${makeTablet(c.title, c.name, c.petT, c.petN)}</div>`).join("") +
  `</div></div>`
).join("");
</script>
</body>
</html>
