<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlanta 長生祿位 — Layout Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ===================================================================
     TUNABLE CONFIG — adjust these, refresh browser to see changes.
     All coordinates are in the real 320 x 848 template space.
  =================================================================== */
  :root {
    /* Center vertical band: y 195 (below canopy) -> 716 (lotus center).
       x narrowed to the CLEAR ZONE between the two 卍 side rails (~76..244)
       so names never spill onto the motifs. Centered on x=160. */
    --band-x: 80px;
    --band-width: 160px;     /* 80 -> 240, ~4px margin from each rail */
    --band-top: 195px;
    --band-bottom: 716px;    /* band height = 716 - 195 = 521 */

    --fixed-size: 38px;      /* ENLARGED fixed text 佛光注照 / 長生祿位 — the PRIMARY element (temple's main request) */
    --fixed-weight: 500;
    --gap-fixed-name: 14px;  /* breathing room between fixed text and name */

    --name-cn-size: 38px;    /* Chinese name — HARD-CAPPED to <= --fixed-size in code (never bigger than 佛光注照) */
    --name-latin-size: 38px; /* English/Vietnamese base size (also capped <= --fixed-size; auto-shrinks to fit) */
    --name-min-size: 18px;   /* never go below this */

    --ink: #2b2620;          /* text color (bw print: near-black) */
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 32px;
    background: #c00; /* deck red section bg, just for the gallery */
    font-family: "Noto Serif TC", serif;
    color: #fff;
  }
  h1 { font-weight: 600; font-size: 22px; margin: 0 0 4px; }
  .sub { opacity: .85; font-size: 13px; margin: 0 0 20px; }
  .toolbar { margin-bottom: 24px; font-size: 14px; }
  .toolbar label { cursor: pointer; }

  .row { margin-bottom: 28px; }
  .row-title { font-size: 13px; opacity: .8; margin: 0 0 10px; font-weight: 500; }
  .gallery { display: flex; flex-wrap: wrap; gap: 22px; align-items: flex-start; }

  .cell { width: 256px; } /* 320 * 0.8 */
  .cell .caption { text-align: center; font-size: 12px; opacity: .85; margin-bottom: 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } /* keep label to ONE line */

  /* Each tablet is built at TRUE 320x848, then scaled for display density. */
  .tablet-scale { transform: scale(0.8); transform-origin: top left; width: 320px; height: 848px; }
  .tablet {
    position: relative;
    width: 320px; height: 848px;
    background: #fff url("./frame-blank.svg") center / 320px 848px no-repeat;
    border-radius: 20px;
    overflow: hidden;
  }

  /* Center band container */
  .band {
    position: absolute;
    left: var(--band-x);
    top: var(--band-top);
    width: var(--band-width);
    height: calc(var(--band-bottom) - var(--band-top));
  }
  .fixed {
    position: absolute; left: 0; width: 100%;
    display: flex; flex-direction: column; align-items: center;
    font-size: var(--fixed-size); font-weight: var(--fixed-weight);
    line-height: 1; color: var(--ink);
  }
  .fixed.top { top: 0; }
  .fixed.bottom { bottom: 0; }
  .fixed > span { display: block; }

  /* Name box: sits in the leftover middle space between top & bottom fixed text */
  .name-box {
    position: absolute; left: 0; width: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink);
  }

  /* Chinese vertical: columns right-to-left, each column a vertical char stack */
  .cn-cols { display: flex; flex-direction: row-reverse; align-items: center; }
  .cn-col  { display: flex; flex-direction: column; align-items: center; line-height: 1; }
  .cn-col > span { display: block; text-align: center; }

  /* Latin horizontal: lines stacked vertically, each line centered */
  .latin { display: flex; flex-direction: column; align-items: center; line-height: 1.15; }
  .latin > span { display: block; white-space: nowrap; }
</style>
</head>
<body>
  <h1>長生祿位 — Atlanta Layout Mockup</h1>
  <p class="sub">Standalone prototype · no production code touched · frame = Atlanta blank SVG · coords in true 320×848 space</p>
  <div id="app"></div>

<script>
/* ===================================================================
   Rendering rules (mirrors the planned Vercel-OG renderer)
=================================================================== */
const CFG = {
  fixedTop: "佛光注照",
  fixedBottom: "長生祿位",
  cnTwoColThreshold: 6,   // Chinese name > this many chars => split into 2 columns
};

function isLatin(s){ return /[A-Za-z]/.test(s); }

function px(varName){
  return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(varName));
}

// Split a Chinese name into vertical columns.
// Rule: 闔家 always its own (left-most) column. Base name splits into 2 cols if > threshold.
function chineseColumns(name){
  let base = name, family = null;
  if (name.endsWith("闔家")) { base = name.slice(0, -2); family = "闔家"; }
  let cols;
  if (base.length > CFG.cnTwoColThreshold) {
    const mid = Math.ceil(base.length / 2);
    cols = [base.slice(0, mid), base.slice(mid)];
  } else {
    cols = [base];
  }
  if (family) cols.push(family); // pushed last => appears left-most (row-reverse)
  return cols;
}

// Split a Latin name into stacked lines: one word per line, but keep a trailing
// family suffix together on ONE compact line, normalized to "& family"
// (shorter than "and family" => the longest line is shorter => bigger font;
//  space around "&" is standard typography).
function latinLines(name){
  let s = name.trim();
  let tail = null;
  const m = s.match(/\s*(?:and\s+family|&\s*family)\s*$/i);
  if (m) { tail = "& family"; s = s.slice(0, m.index); }
  const lines = s.split(/\s+/).filter(Boolean);
  if (tail) lines.push(tail);
  return lines;
}

function makeTablet(name){
  const bandTop = px("--band-top");
  const bandBottom = px("--band-bottom");
  const bandH = bandBottom - bandTop;
  const fixedSize = px("--fixed-size");
  const gap = px("--gap-fixed-name");

  const topChars = CFG.fixedTop.length;
  const botChars = CFG.fixedBottom.length;
  const topH = topChars * fixedSize;
  const botH = botChars * fixedSize;

  // leftover middle space for the name
  const nameTop = topH + gap;
  const nameBottom = botH + gap;
  const midH = bandH - nameTop - nameBottom;
  const midW = px("--band-width");

  // build name node + compute fit-scaled font size
  let nameNode, fontSize;
  if (isLatin(name)) {
    const lines = latinLines(name);
    let fs = px("--name-latin-size");
    const fitByH = midH / (lines.length * 1.15);
    // Width fit: the longest line must stay inside the band WITH inner padding,
    // so text never touches the 卍 side rails.
    const PAD_X = 8;     // inner horizontal padding each side
    const CHAR_W = 0.60; // avg serif glyph width as fraction of font size (conservative)
    const longestChars = Math.max(...lines.map(l => l.length));
    const fitByW = (midW - 2 * PAD_X) / (longestChars * CHAR_W);
    // HARD RULE: name must never be bigger than the fixed text 佛光注照
    fs = Math.max(px("--name-min-size"), Math.min(fs, fitByH, fitByW, fixedSize));
    nameNode = `<div class="latin" style="font-size:${fs}px">` +
      lines.map(l => `<span>${l}</span>`).join("") + `</div>`;
  } else {
    const cols = chineseColumns(name);
    const maxColLen = Math.max(...cols.map(c => c.length));
    let fs = px("--name-cn-size");
    const fitByH = midH / maxColLen;            // tallest column must fit height
    const colGap = 0.25;                         // gap between cols as fraction of fs
    const fitByW = midW / (cols.length + (cols.length - 1) * colGap);
    // HARD RULE: name must never be bigger than the fixed text 佛光注照
    fs = Math.max(px("--name-min-size"), Math.min(fs, fitByH, fitByW, fixedSize));
    nameNode = `<div class="cn-cols" style="gap:${fs*0.25}px">` +
      cols.map(c => `<div class="cn-col" style="font-size:${fs}px">` +
        c.split("").map(ch => `<span style="width:${fs}px">${ch}</span>`).join("") +
      `</div>`).join("") + `</div>`;
  }

  const topFixed = `<div class="fixed top">` +
    CFG.fixedTop.split("").map(c=>`<span>${c}</span>`).join("") + `</div>`;
  const botFixed = `<div class="fixed bottom">` +
    CFG.fixedBottom.split("").map(c=>`<span>${c}</span>`).join("") + `</div>`;
  const nameBox = `<div class="name-box" style="top:${nameTop}px;bottom:${nameBottom}px">${nameNode}</div>`;

  return `<div class="tablet-scale"><div class="tablet">
      <div class="band">${topFixed}${nameBox}${botFixed}</div>
  </div></div>`;
}

const ROWS = [
  { title: "Chinese names", cases: [
    {cap:"Two characters", name:"張三"},
    {cap:"Three characters", name:"王小二"},
    {cap:"Four characters", name:"歐陽蘭君"},
    {cap:"More characters (法師)", name:"上弘下謙法師"},
  ]},
  { title: "Chinese names w/ 闔家 (闔家 on its own column)", cases: [
    {cap:"Two + family", name:"張三闔家"},
    {cap:"Three + family", name:"王小二闔家"},
    {cap:"Four + family", name:"歐陽蘭君闔家"},
    {cap:"More + family", name:"愛新覺羅波奇闔家"},
  ]},
  { title: "English names (horizontal, stacked — NEW)", cases: [
    {cap:"Short", name:"Taylor Smith"},
    {cap:"Long", name:"Elizabeth Alexander Williamson"},
    {cap:"With family", name:"Elizabeth Alexander Williamson & family"},
    {cap:"Two words", name:"David Chen & family"},
  ]},
  { title: "Vietnamese names w/ family (horizontal, stacked)", cases: [
    {cap:"Vietnamese 1", name:"Nguyễn Văn An & family"},
    {cap:"Vietnamese 2", name:"Trần Thị Hương & family"},
  ]},
];

function render(){
  const html = ROWS.map(row =>
    `<div class="row"><div class="row-title">${row.title}</div><div class="gallery">` +
    row.cases.map(c =>
      `<div class="cell"><div class="caption">${c.cap} · ${c.name}</div>${makeTablet(c.name)}</div>`
    ).join("") +
    `</div></div>`
  ).join("");
  document.getElementById("app").innerHTML = html;
}

render();
</script>
</body>
</html>
